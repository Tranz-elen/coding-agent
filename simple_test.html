<!DOCTYPE html>
<html>
<head>
    <title>测试死亡原因显示</title>
</head>
<body>
    <div id="game-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);color:white;justify-content:center;align-items:center;">
        <div>
            <h2 id="overlay-title">标题</h2>
            <p id="overlay-text">内容</p>
        </div>
    </div>
    
    <button onclick="test()">测试死亡原因显示</button>
    
    <script>
        const overlayTitle = document.getElementById("overlay-title");
        const overlayText = document.getElementById("overlay-text");
        const gameOverlay = document.getElementById("game-overlay");
        
        function showOverlay(title, text) {
            overlayTitle.textContent = title;
            overlayText.innerHTML = text;
            gameOverlay.style.display = "flex";
        }
        
        function test() {
            showOverlay("游戏结束", "死亡原因: 撞到了分身蛇<br>最终得分: 100<br>蛇的长度: 5<br>游戏时间: 30秒<br>特殊食物: 2个<br>当前难度最高分: 500");
        }
    </script>
</body>
</html>
